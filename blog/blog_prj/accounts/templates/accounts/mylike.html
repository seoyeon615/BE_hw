<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="{% url 'blog:list' %}">홈으로</a>
    <h2>내가 좋아요 누른 블로그</h2>

    {% for post in liked_posts %}
        <h2>{{ post.title }}</h2>
        <h2>{{ post.content }}</h2>
        <h2>{{ post.author.nickname }}</h2>
    {% empty %}
        좋아요 누른 글이 없습니다
    {% endfor %}
</body>
</html>
