<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>덕멋 인스타그램</title>
  </head>
  <body>
    
    <h1>덕멋 인스타그램</h1>
    <a href="{% url 'posts:create' %}">글 작성하기</a> <hr>

    <form action="{% url 'posts:result' %}" method="get">
    <input type="text" name="query" required>
    <input type="submit" value="검색" />
    </form>

    {% for post in posts %}
        <h2><a href="{% url 'posts:detail' post.id %}">{{post.title}}</a></h2>
        <p>{{post.content}}</p>
        <p> 조회수 : {{post.views}}</p>
        <p>{{post.created_at}}</p>

    {% empty %}
        작성된 글이 없습니다.
    {% endfor %}



  
  </body>
</html>
