<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>검색 결과</title>
</head>
<body>

  <h1>"{{ query }}" 검색 결과 페이지 입니다.</h1>

  {% if posts %}
    {% for post in posts %}
        <p><a href="{% url 'phone:detail' post.id %}">{{ post.name }}</a> {{ post.number }}</p><hr>

    {% endfor %}
  {% else %}
    <p>해당 검색어와 관련된 정보가 없습니다.</p>
  {% endif %}

  <a href="{% url 'phone:phone_list' %}">연락처 목록으로 돌아가기</a>

</body>
</html>
