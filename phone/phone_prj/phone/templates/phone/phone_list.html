<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연락처 목록</title>
  </head>
  <body>
    <h1>연락처 목록</h1>
    <form action="{% url 'phone:result' %}" method="get">
    <input type="text" name="name" placeholder="이름 입력" required>

    <input type="submit" value="검색" />
</form>
    

    {% for post in posts %}
        <p><a href="{% url 'phone:detail' post.id %}">{{ post.name }}</a> {{post.number}} <a href="{% url 'phone:update' post.id %}">수정하기</a> <a href="{% url 'phone:delete' post.id %}">삭제하기</a></p><hr>


    {% endfor %}
    
    <a href="{% url 'phone:create' %}">새 연락처 등록</a>

  </body>
</html>
