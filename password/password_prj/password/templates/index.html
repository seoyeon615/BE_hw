<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문서 제목</title>
  </head>
  <body>
    <h1>무작위로 비밀번호를 정해봅시다!</h1>

    <form action="{% url 'password:result' %}" method="get">
    <h2>비밀번호 길이를 입력하세요</h2>
    <input type="number" name="length">

    <br />

    <label><input type="checkbox" name="upper"> 영어 대문자 포함</label><br>
    <label><input type="checkbox" name="lower"> 영어 소문자 포함</label><br>
    <label><input type="checkbox" name="digits"> 숫자 포함</label><br>
    <label><input type="checkbox" name="special"> 특수문자 포함</label><br>
    <br />

    <button type="submit">비밀번호 생성</button>
</form>


  </body>
</html>
