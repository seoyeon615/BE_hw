<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>내 스크랩 목록</title>
</head>
<body>
    <a href="{% url 'posts:main' %}">메인페이지로</a>
    <h2>내가 스크랩 한 글</h2>

    {% for post in scraped_posts %}
            <a href="{% url 'posts:detail' post.id %}"><h3>{{ post.title }}</h3></a>
            <p>{{ post.content }}</p>
            <p>{{ post.created_at }}</p>
            <p>{% if post.is_anonymous %}익명{% else %}{{ post.author }}{% endif %}</p>
        <hr>
    {% empty %}
        <p>스크랩한 글이 없습니다.</p>
    {% endfor %}
</body>
</html>
