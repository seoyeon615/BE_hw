<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>글 수정</h2>
    <form method="POST" action="{% url 'posts:update' post.id %}">
      {% csrf_token %} 
      
      제목 - <input type="text" value="{{ post.title }}" name="title" /><br /><br />
      내용 - <textarea name="content">{{ post.content }}</textarea><br /><br />
      
      <label>
        <input type="checkbox" name="anonymous" {% if post.is_anonymous %} checked {% endif %}> 익명
      </label>

      <input type="submit" value="수정하기" />
    </form>
  </body>
</html>
